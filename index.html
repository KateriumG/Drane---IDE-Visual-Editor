<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drane Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="toolbar">
    <button id="btn-div">Div</button>
    <button id="btn-button">Button</button>
    <button id="btn-h1">H1</button>
  </div>

  <div id="canvas"></div>

  <div id="inspector">
    <h3>Inspector</h3>

    <label>Texto</label>
    <input id="prop-text" type="text">

    <label>Borde</label>
    <input id="prop-border" type="checkbox">

    <label>Color Fondo</label>
    <input id="prop-bg" type="color">

    <label>Color Texto</label>
    <input id="prop-color" type="color">
  </div>

  <script src="main.js"></script>
</body>
</html>
